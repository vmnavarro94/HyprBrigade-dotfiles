# /* ---- 💫 https://github.com/vmnavarro94/HyprBrigade 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# bindd = $mainMod, Z, My z app, exec APPNAME









# Remapped to free SUPER+T and SUPER+W for kitty (new tab / close tab)
unbind = $mainMod, T, Global theme switcher using Wallust, exec, $scriptsDir/ThemeChanger.sh
bindd = $mainMod SHIFT, T, Global theme switcher using Wallust, exec, $scriptsDir/ThemeChanger.sh

unbind = $mainMod, W, select wallpaper, exec, $UserScripts/WallpaperSelect.sh
unbind = $mainMod SHIFT, W, wallpaper effects, exec, $UserScripts/WallpaperEffects.sh
bindd = $mainMod SHIFT, W, select wallpaper, exec, $UserScripts/WallpaperSelect.sh
bindd = $mainMod CTRL, W, wallpaper effects, exec, $UserScripts/WallpaperEffects.sh

# Smart close: hide dropdown terminal instead of killing it
unbind = $mainMod, Q
bindd = $mainMod, Q, close or hide dropdown terminal, exec, $UserScripts/SmartClose.sh $term

# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset

# -------------------------------------------------------
# macOS-like shortcuts (SUPER = ⌘ Cmd)
# Based on: https://satya164.page/posts/macos-like-shortcuts-in-hyprland
# -------------------------------------------------------
# Note: Letters already used by window manager (A, B, D, E, G, H, I,
#       M, N, P, Q, S, U) are intentionally skipped to avoid conflicts.

# Copy & Paste — use Ctrl+Insert / Shift+Insert so they work in terminals too
#   (Ctrl+C is SIGINT in terminals, Ctrl+V has special behavior)
binde = $mainMod, C, sendshortcut, CTRL, INSERT,
binde = $mainMod, V, sendshortcut, SHIFT, INSERT,

# Cut, Undo, Redo
binde = $mainMod, X, sendshortcut, CTRL, X,
binde = $mainMod, Z, sendshortcut, CTRL, Z,
binde = $mainMod SHIFT, Z, sendshortcut, CTRL, Y,

# Common app shortcuts (free keys)
binde = $mainMod, F, sendshortcut, CTRL, F,   # Find
binde = $mainMod, R, sendshortcut, CTRL, R,   # Refresh
binde = $mainMod, L, sendshortcut, CTRL, L,   # Address bar / clear line
binde = $mainMod, O, sendshortcut, CTRL, O,   # Open
binde = $mainMod, K, sendshortcut, CTRL, K,   # Link / command palette
binde = $mainMod, J, sendshortcut, CTRL, J,   # Downloads / misc
binde = $mainMod, Y, sendshortcut, CTRL, Y,   # Redo (alt)

# Tab management (T and W were unbound above from theme/wallpaper)
binde = $mainMod, T, sendshortcut, CTRL, T,   # New tab
binde = $mainMod, W, sendshortcut, CTRL, W,   # Close tab

# -------------------------------------------------------
# macOS-style text editing shortcuts (Emacs-like navigation)
# These remap Ctrl+key → cursor movement / editing keys
# -------------------------------------------------------
binde = CTRL, A, sendshortcut, , home,
binde = CTRL, E, sendshortcut, , end,
binde = CTRL, F, sendshortcut, , right,
binde = CTRL, B, sendshortcut, , left,
binde = CTRL, P, sendshortcut, , up,
binde = CTRL, N, sendshortcut, , down,
binde = CTRL, D, sendshortcut, , delete,
binde = CTRL, H, sendshortcut, , backspace,
